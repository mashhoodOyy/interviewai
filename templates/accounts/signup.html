{% extends 'base.html' %}
{% block title %}Sign Up{% endblock %}

{% block content %}
    <div class="card mx-auto p-4" style="max-width: 450px;">
        <h3 class="text-center fw-bold mb-4">Create Account 🚀</h3>
        <form method="POST">
            {% csrf_token %}
            <div class="mb-3">
                <label for="signup-username" class="form-label">Username</label>
                <input id="signup-username" type="text" name="username" class="form-control" required>
            </div>
            <div class="mb-3">
                <label for="signup-email" class="form-label">Email</label>
                <input id="signup-email" type="email" name="email" class="form-control" required>
            </div>
            <div class="mb-3">
                <label for="signup-password" class="form-label">Password</label>
                <input id="signup-password" type="password" name="password" class="form-control" required>
            </div>
            <div class="mb-3">
                <label for="signup-target-role" class="form-label">Target Job Role</label>
                <input id="signup-target-role" type="text" name="target_role" class="form-control"
                       placeholder="e.g. Python Developer, Data Scientist">
            </div>
            <div class="mb-3">
                <label for="signup-experience-level" class="form-label">Experience Level</label>
                <select id="signup-experience-level" name="experience_level" class="form-select">
                    <option value="entry">Entry Level (0-2 years)</option>
                    <option value="mid">Mid Level (2-5 years)</option>
                    <option value="senior">Senior Level (5+ years)</option>
                </select>
            </div>
            <button type="submit" class="btn btn-primary w-100">Create Account</button>
        </form>
        <p class="text-center mt-3">
            Already have an account? <a href="{% url 'login' %}">Login</a>
        </p>
    </div>
{% endblock %}
