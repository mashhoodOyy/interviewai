{% extends 'base.html' %}
{% block title %}Login{% endblock %}

{% block content %}
    <div class="card mx-auto p-4" style="max-width: 400px;">
        <h3 class="text-center fw-bold mb-4">Welcome Back 👋</h3>
        <form method="POST">
            {% csrf_token %}
            <div class="mb-3">
                <label for="login-username" class="form-label">Username</label>
                <input id="login-username" type="text" name="username" class="form-control" required>
            </div>
            <div class="mb-3">
                <label for="login-password" class="form-label">Password</label>
                <input id="login-password" type="password" name="password" class="form-control" required>
            </div>
            <button type="submit" class="btn btn-primary w-100">Login</button>
        </form>
        <p class="text-center mt-3">
            Don't have an account? <a href="{% url 'signup' %}">Sign Up</a>
        </p>
    </div>
{% endblock %}
